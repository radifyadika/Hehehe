<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Kaka Nopi! 🐨✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');

        body {
            background-color: #ffd1dc;
            font-family: 'Fredoka', sans-serif;
            color: #5c3a45;
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Menggunakan 100dvh untuk mengatasi address bar HP */
            height: 100vh;
            height: 100dvh; 
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed; /* Mencegah layar mantul (bouncing) di iOS */
        }

        /* SCREEN 1: GAME TEMBAK BEBAN */
        #game-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffb6c1;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-title {
            margin-top: 50px;
            font-size: 20px;
            color: #d81159;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            text-align: center;
            z-index: 10;
        }

        .target {
            position: absolute;
            font-size: 40px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            animation: floatTarget 3s infinite alternate ease-in-out;
            transition: transform 0.1s;
            z-index: 5;
        }

        .target:active {
            transform: scale(0.5);
        }

        @keyframes floatTarget {
            0% { transform: translateY(0px) rotate(-10deg); }
            100% { transform: translateY(-20px) rotate(10deg); }
        }

        /* SCREEN 2: LOADING KOALA JALAN */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffd1dc;
            z-index: 40;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .walking-koala {
            font-size: 60px;
            animation: walk 3s linear forwards;
        }

        .loading-text {
            font-size: 18px;
            font-weight: bold;
            color: #d81159;
            margin-top: 10px;
            animation: blink 1s infinite;
        }

        @keyframes walk {
            0% { transform: translateX(-60vw) rotate(-5deg); }
            25% { transform: translateX(-30vw) rotate(5deg) translateY(-10px); }
            50% { transform: translateX(0) rotate(-5deg); }
            75% { transform: translateX(30vw) rotate(5deg) translateY(-10px); }
            100% { transform: translateX(60vw) rotate(0deg); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* SCREEN 3: OVERLAY TYPING */
        #typing-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 30;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #typing-text {
            color: #ff8fab;
            font-size: 18px;
            line-height: 1.6;
            text-align: left;
            width: 90%;
            max-width: 350px;
            min-height: 150px;
        }

        .btn-open {
            margin-top: 20px;
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-family: 'Fredoka', sans-serif;
            font-weight: bold;
            cursor: pointer;
            display: none;
            box-shadow: 0px 4px 10px rgba(255, 77, 109, 0.5);
        }

        /* SCREEN 4: MAIN SCREEN */
        #main-screen {
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .puk-puk-area {
            position: relative;
            width: 150px;
            height: 150px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation; /* Mencegah double tap zoom di HP */
            margin-bottom: 20px;
            z-index: 10;
        }

        .hand {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 50px;
            z-index: 2;
            transition: top 0.1s;
        }

        .koala-main {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            font-size: 80px;
            transition: transform 0.1s;
        }

        /* Animasi saat di-puk-puk */
        .puk-puk-area.patting .hand {
            top: 10px;
        }

        .puk-puk-area.patting .koala-main {
            transform: translateX(-50%) scaleY(0.85) translateY(10px);
        }

        .message-box {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 20px;
            text-align: center;
            max-width: 80%;
            box-shadow: 0 5px 15px rgba(255, 143, 171, 0.3);
            font-size: 16px;
            color: #d81159;
            font-weight: 600;
            z-index: 10;
        }

        /* MEME STICKERS TENOR */
        .sticker {
            position: absolute;
            width: 150px;
            pointer-events: none;
            z-index: 5;
            opacity: 0.9;
        }

        .st1 {
            top: 5%;
            left: 2%;
            transform: rotate(-15deg);
            animation: float1 4s infinite alternate;
        }

        .st2 {
            bottom: 10%;
            right: 2%;
            transform: rotate(10deg);
            animation: float2 3s infinite alternate;
        }

        .st3 {
            top: 15%;
            right: 2%;
            transform: rotate(20deg);
            animation: float1 5s infinite alternate;
        }

        @keyframes float1 {
            0% { transform: translateY(0px) rotate(-15deg); }
            100% { transform: translateY(-15px) rotate(-5deg); }
        }

        @keyframes float2 {
            0% { transform: translateY(0px) rotate(10deg); }
            100% { transform: translateY(-10px) rotate(20deg); }
        }

        /* ==================================================
           SCREEN 5: FINAL SURPRISE (BOUQUET & EMOJI FLOOD) 
           ================================================== */
        #final-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffd1dc;
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #countdown-text {
            font-size: 120px;
            color: #d81159;
            font-weight: bold;
            text-shadow: 4px 4px 0px #fff;
            animation: pulse 1s infinite;
        }

        #bouquet-container {
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .give-flower {
            font-size: 100px;
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, floatTarget 3s infinite alternate ease-in-out 1s;
        }

        .final-message {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 25px;
            margin-top: 20px;
            color: #d81159;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 8px 20px rgba(216, 17, 89, 0.3);
            animation: popIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            max-width: 80%;
        }

        .bg-emoji {
            position: absolute;
            bottom: -50px;
            pointer-events: none;
            z-index: 1;
            animation: flyUp linear forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes flyUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>

<body>

    <audio id="bg-music" loop>
        <source src="helikopter.mp3" type="audio/mpeg">
    </audio>

    <div id="game-screen">
        <div class="game-title">
            <strong>Hempaskan semua beban hari ini! 💢</strong><br>
            <span style="font-size:14px; color:#6a4c54;">Sisa: <span id="target-count">8</span> beban</span>
        </div>
    </div>

    <div id="loading-screen">
        <div class="walking-koala">🐨</div>
        <div class="loading-text">Menyiapkan hadiah kecil...</div>
    </div>

    <div id="typing-overlay">
        <div id="typing-text"></div>
        <button class="btn-open" id="btn-open" onclick="openMainScreen()">Buka Hadiah 🎁</button>
    </div>

    <div id="main-screen">
        <div class="sticker st1">
            <div class="tenor-gif-embed" data-postid="21667740" data-share-method="host" data-aspect-ratio="1"
                data-width="100%"><a href="https://tenor.com/view/iklog-gif-21667740">Iklog Sticker</a></div>
        </div>
        <div class="sticker st2">
            <div class="tenor-gif-embed" data-postid="14725166563590009362" data-share-method="host"
                data-aspect-ratio="0.903614" data-width="100%"><a
                    href="https://tenor.com/view/line-gif-14725166563590009362">Line GIF</a></div>
        </div>
        <div class="sticker st3">
            <div class="tenor-gif-embed" data-postid="10227670666283113504" data-share-method="host"
                data-aspect-ratio="1.26396" data-width="100%"><a
                    href="https://tenor.com/view/minnie-mouse-and-mickey-mouse-gif-10227670666283113504">Minnie Mouse</a></div>
        </div>
        <script type="text/javascript" async src="https://tenor.com/embed.js"></script>

        <h2 style="color: #d81159; margin-bottom: 5px; z-index: 10; text-align: center;">You Survived Today! 🎉</h2>

        <div class="puk-puk-area" id="puk-puk" onclick="pukPuk()">
            <div class="hand" id="hand">🤚</div>
            <div class="koala-main" id="main-koala">🐨</div>
        </div>

        <div class="message-box" id="puk-text">
            Coba puk-puk koalanya deh!
        </div>
    </div>

    <div id="final-screen">
        <div id="countdown-text">3</div>
        <div id="bouquet-container">
            <div class="give-flower">🐨💐</div>
            <div class="final-message">Special Bouquet buat Kaka! ✨</div>
        </div>
    </div>

    <script>
        // --- SYNTH AUDIO (Suara tembakan & puk-puk) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playPopSound(pitch = 800) {
            // Menggunakan TRY-CATCH agar script tidak macet jika HP memblokir audio API
            try {
                if (audioCtx.state === 'suspended') {
                    // Tangkap error promise dari resume jika diblokir browser
                    audioCtx.resume().catch((err) => console.log("Audio diblokir HP", err)); 
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(pitch, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(pitch - 300, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch (e) {
                console.log("Gagal memutar efek suara (Aman, animasi tetap jalan)");
            }
        }

        // --- GAME LOGIC ---
        let totalTargets = 8;
        const gameScreen = document.getElementById('game-screen');
        const emojis = ["💢", "🌧️", "👻", "🌪️", "🤯"];

        function initGame() {
            for (let i = 0; i < totalTargets; i++) {
                let tgt = document.createElement('div');
                tgt.className = 'target';
                tgt.innerText = emojis[Math.floor(Math.random() * emojis.length)];

                // Mengurangi margin agar tidak keluar layar di HP kecil
                let randomX = Math.random() * 70 + 5; 
                let randomY = Math.random() * 60 + 20;

                tgt.style.left = randomX + 'vw';
                tgt.style.top = randomY + 'vh';

                // Gunakan onclick untuk responsibilitas sempurna di mobile
                tgt.onclick = function () {
                    playPopSound(1200);
                    this.remove();
                    totalTargets--;
                    document.getElementById('target-count').innerText = totalTargets;

                    if (totalTargets === 0) {
                        endGame();
                    }
                };
                gameScreen.appendChild(tgt);
            }
        }

        function endGame() {
            gameScreen.style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';

            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                startTypingScreen();
            }, 3500);
        }

        // --- TYPING OVERLAY LOGIC ---
        const message = "Hmmmm... pasti capek banget hari ini yaa Kaa. But u killed it today very very well !!. Ini hadiah kecil buat kaka, walau cuma sesederhana ini. Semoga sukaa ya Ka hehehe terimakasihh... \n\n– Radif 🐾";
        let i = 0;

        function startTypingScreen() {
            const typingOverlay = document.getElementById('typing-overlay');
            typingOverlay.style.display = 'flex';

            let bgm = document.getElementById('bg-music');
            bgm.volume = 0.3;
            // Catch error jika autoplay musik ditolak HP
            bgm.play().catch(e => console.log("Lagu butuh interaksi user dulu di beberapa HP"));

            typeWriter();
        }

        function typeWriter() {
            if (i < message.length) {
                let char = message.charAt(i);
                if (char === '\n') {
                    document.getElementById('typing-text').innerHTML += '<br>';
                } else {
                    document.getElementById('typing-text').innerHTML += char;
                }
                i++;
                setTimeout(typeWriter, 50);
            } else {
                document.getElementById('btn-open').style.display = 'block';
            }
        }

        // --- MAIN SCREEN LOGIC ---
        function openMainScreen() {
            document.getElementById('typing-overlay').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
        }

        // --- PUK PUK LOGIC ---
        let patCount = 0;
        let surpriseTriggered = false; // Kunci agar timer tidak double trigger di HP

        function pukPuk() {
            if (surpriseTriggered) return; // Jika sudah tap 10x, hentikan tap berikutnya

            playPopSound(900);
            patCount++;

            let area = document.getElementById('puk-puk');
            let text = document.getElementById('puk-text');

            area.classList.add('patting');
            setTimeout(() => {
                area.classList.remove('patting');
            }, 150);

            if (patCount === 1) text.innerText = "Hehehehe ~ 🌸";
            else if (patCount === 3) text.innerText = "Good job for todayy! ✨";
            else if (patCount === 5) text.innerText = "Enjoy ur timee Kaa ~ 😎";
            else if (patCount === 8) text.innerText = "Jangan lupa istirahat ya Ka hehehe... 🐾";
            else if (patCount === 10) {
                text.innerText = "Eitsss, bentar ada satu lagi! 🐨";
                surpriseTriggered = true; // Kunci tap
                setTimeout(startFinalSurprise, 1500);
            }
        }

        // --- FINAL SURPRISE LOGIC ---
        function startFinalSurprise() {
            document.getElementById('main-screen').style.display = 'none';
            const finalScreen = document.getElementById('final-screen');
            finalScreen.style.display = 'flex';

            let count = 3;
            const countEl = document.getElementById('countdown-text');
            countEl.innerText = count;

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countEl.innerText = count;
                    playPopSound(1000 + (count * 100)); // Suara bip hitung mundur
                } else {
                    clearInterval(timer);
                    countEl.style.display = 'none';
                    showBouquet();
                }
            }, 1000);
        }

        function showBouquet() {
            playPopSound(1500); // Tada sound
            document.getElementById('bouquet-container').style.display = 'flex';
            startEmojiFlood();
        }

        function startEmojiFlood() {
            const emojisToFlood = ["🐨", "⭐", "🤣", "🌸", "💐", "✨", "😆"];
            const finalScreen = document.getElementById('final-screen');

            // Memicu hujan emoji setiap 150ms
            setInterval(() => {
                const el = document.createElement('div');
                el.className = 'bg-emoji';
                el.innerText = emojisToFlood[Math.floor(Math.random() * emojisToFlood.length)];

                // Acak posisi horizontal, ukuran, dan kecepatan
                const startX = Math.random() * 100; // 0 sampai 100vw
                const duration = Math.random() * 3 + 3; // Animasi selama 3-6 detik
                const size = Math.random() * 20 + 25; // Ukuran font 25-45px

                el.style.left = startX + 'vw';
                el.style.fontSize = size + 'px';
                el.style.animationDuration = duration + 's';

                finalScreen.appendChild(el);

                // Bersihkan elemen dari DOM agar HP tidak lag
                el.addEventListener('animationend', () => {
                    el.remove();
                });
                
                // Fallback keamanan jika animasi terhenti (agar memory HP tidak penuh)
                setTimeout(() => { if (el.parentNode) el.remove(); }, 7000);
            }, 150);
        }

        window.onload = initGame;
    </script>
</body>

</html>
