<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Kaka Nopi! 🐨✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');

        body {
            background-color: #ffd1dc;
            font-family: 'Fredoka', sans-serif;
            color: #5c3a45;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* SCREEN 1: GAME TEMBAK BEBAN */
        #game-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffb6c1;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-title {
            margin-top: 50px;
            font-size: 20px;
            color: #d81159;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            text-align: center;
        }

        .target {
            position: absolute;
            font-size: 40px;
            cursor: crosshair;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            animation: floatTarget 3s infinite alternate ease-in-out;
            transition: transform 0.1s;
        }

        .target:active {
            transform: scale(0.5);
        }

        @keyframes floatTarget {
            0% {
                transform: translateY(0px) rotate(-10deg);
            }

            100% {
                transform: translateY(-20px) rotate(10deg);
            }
        }

        /* SCREEN 2: LOADING KOALA JALAN */
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffd1dc;
            z-index: 40;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .walking-koala {
            font-size: 60px;
            animation: walk 3s linear forwards;
        }

        .loading-text {
            font-size: 18px;
            font-weight: bold;
            color: #d81159;
            margin-top: 10px;
            animation: blink 1s infinite;
        }

        @keyframes walk {
            0% {
                transform: translateX(-60vw) rotate(-5deg);
            }

            25% {
                transform: translateX(-30vw) rotate(5deg) translateY(-10px);
            }

            50% {
                transform: translateX(0) rotate(-5deg);
            }

            75% {
                transform: translateX(30vw) rotate(5deg) translateY(-10px);
            }

            100% {
                transform: translateX(60vw) rotate(0deg);
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* SCREEN 3: OVERLAY TYPING */
        #typing-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 30;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #typing-text {
            color: #ff8fab;
            font-size: 18px;
            line-height: 1.6;
            text-align: left;
            width: 90%;
            max-width: 350px;
            min-height: 150px;
        }

        .btn-open {
            margin-top: 20px;
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-family: 'Fredoka', sans-serif;
            font-weight: bold;
            cursor: pointer;
            display: none;
            box-shadow: 0px 4px 10px rgba(255, 77, 109, 0.5);
        }

        /* SCREEN 4: MAIN SCREEN */
        #main-screen {
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .puk-puk-area {
            position: relative;
            width: 150px;
            height: 150px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            margin-bottom: 20px;
            z-index: 10;
        }

        .hand {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 50px;
            z-index: 2;
            transition: top 0.1s;
        }

        .koala-main {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            font-size: 80px;
            transition: transform 0.1s;
        }

        /* Animasi saat di-puk-puk */
        .puk-puk-area.patting .hand {
            top: 10px;
        }

        .puk-puk-area.patting .koala-main {
            transform: translateX(-50%) scaleY(0.85) translateY(10px);
        }

        .message-box {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 15px 25px;
            border-radius: 20px;
            text-align: center;
            max-width: 80%;
            box-shadow: 0 5px 15px rgba(255, 143, 171, 0.3);
            font-size: 16px;
            color: #d81159;
            font-weight: 600;
            z-index: 10;
        }

        /* MEME STICKERS TENOR */
        .sticker {
            position: absolute;
            width: 180px;
            /* Lebar div disesuaikan untuk GIF Tenor */
            pointer-events: none;
            /* Agar GIF tidak bisa diklik dan tidak mengganggu tombol lain */
            z-index: 5;
            opacity: 0.9;
        }

        /* Modifikasi posisi agar tidak terlalu menumpuk */
        .st1 {
            top: 5%;
            left: 5%;
            transform: rotate(-15deg);
            animation: float1 4s infinite alternate;
        }

        .st2 {
            bottom: 10%;
            right: 5%;
            transform: rotate(10deg);
            animation: float2 3s infinite alternate;
        }

        .st3 {
            top: 15%;
            right: 5%;
            transform: rotate(20deg);
            animation: float1 5s infinite alternate;
        }

        @keyframes float1 {
            0% {
                transform: translateY(0px) rotate(-15deg);
            }

            100% {
                transform: translateY(-15px) rotate(-5deg);
            }
        }

        @keyframes float2 {
            0% {
                transform: translateY(0px) rotate(10deg);
            }

            100% {
                transform: translateY(-10px) rotate(20deg);
            }
        }
    </style>
</head>

<body>

    <!-- AUDIO ELEMENT (Lagu Helikopter) -->
    <audio id="bg-music" loop>
        <source src="helikopter.mp3" type="audio/mpeg">
    </audio>

    <!-- SCREEN 1: GAME TEMBAK BEBAN -->
    <div id="game-screen">
        <div class="game-title">
            <strong>Hempaskan semua beban hari ini! 💢</strong><br>
            <span style="font-size:14px; color:#6a4c54;">Sisa: <span id="target-count">8</span> beban</span>
        </div>
    </div>

    <!-- SCREEN 2: LOADING KOALA JALAN -->
    <div id="loading-screen">
        <div class="walking-koala">🐨</div>
        <div class="loading-text">Menyiapkan hadiah kecil...</div>
    </div>

    <!-- SCREEN 3: OVERLAY TYPING -->
    <div id="typing-overlay">
        <div id="typing-text"></div>
        <button class="btn-open" id="btn-open" onclick="openMainScreen()">Buka Hadiah 🎁</button>
    </div>

    <!-- SCREEN 4: MAIN SCREEN PUK PUK -->
    <div id="main-screen">

        <!-- ================= STICKER TENOR ================= -->
        <div class="sticker st1">
            <div class="tenor-gif-embed" data-postid="21667740" data-share-method="host" data-aspect-ratio="1"
                data-width="100%"><a href="https://tenor.com/view/iklog-gif-21667740">Iklog Sticker</a>from <a
                    href="https://tenor.com/search/iklog-stickers">Iklog Stickers</a></div>
        </div>

        <div class="sticker st2">
            <div class="tenor-gif-embed" data-postid="14725166563590009362" data-share-method="host"
                data-aspect-ratio="0.903614" data-width="100%"><a
                    href="https://tenor.com/view/line-gif-14725166563590009362">Line GIF</a>from <a
                    href="https://tenor.com/search/line-gifs">Line GIFs</a></div>
        </div>

        <div class="sticker st3">
            <div class="tenor-gif-embed" data-postid="10227670666283113504" data-share-method="host"
                data-aspect-ratio="1.26396" data-width="100%"><a
                    href="https://tenor.com/view/minnie-mouse-and-mickey-mouse-gif-10227670666283113504">Minnie Mouse
                    And Mickey Mouse GIF</a>from <a
                    href="https://tenor.com/search/minnie+mouse+and+mickey+mouse-gifs">Minnie Mouse And Mickey Mouse
                    GIFs</a></div>
        </div>

        <!-- Script wajib dari Tenor untuk menampilkan GIF-nya -->
        <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
        <!-- ================================================= -->

        <h2 style="color: #d81159; margin-bottom: 5px; z-index: 10;">You Survived Today! 🎉</h2>

        <!-- Fitur Puk Puk -->
        <div class="puk-puk-area" id="puk-puk" onpointerdown="pukPuk()">
            <div class="hand" id="hand">🤚</div>
            <div class="koala-main" id="main-koala">🐨</div>
        </div>

        <div class="message-box" id="puk-text">
            Coba puk-puk koalanya deh!
        </div>
    </div>

    <script>
        // --- SYNTH AUDIO (Suara tembakan & puk-puk) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playPopSound(pitch = 800) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(pitch, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(pitch - 300, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // --- GAME LOGIC ---
        let totalTargets = 8;
        const gameScreen = document.getElementById('game-screen');
        const emojis = ["💢", "🌧️", "👻", "🌪️", "🤯"];

        function initGame() {
            for (let i = 0; i < totalTargets; i++) {
                let tgt = document.createElement('div');
                tgt.className = 'target';
                tgt.innerText = emojis[Math.floor(Math.random() * emojis.length)];

                let randomX = Math.random() * 80;
                let randomY = Math.random() * 60 + 20;

                tgt.style.left = randomX + 'vw';
                tgt.style.top = randomY + 'vh';

                tgt.onpointerdown = function () {
                    playPopSound(1200);
                    this.remove();
                    totalTargets--;
                    document.getElementById('target-count').innerText = totalTargets;

                    if (totalTargets === 0) {
                        endGame();
                    }
                };
                gameScreen.appendChild(tgt);
            }
        }

        function endGame() {
            gameScreen.style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';

            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                startTypingScreen();
            }, 3000);
        }

        // --- TYPING OVERLAY LOGIC ---
        const message = "Hmmmm...  pasti capek banget hari ini yaa Kaa. But u killed it today very very well !!. Ini hadiah kecil buat kaka, walau cuma sesederhana ini. Semoga sukaa ya Ka hehehe terimakasihh... \n\n– Radif 🐾";
        let i = 0;

        function startTypingScreen() {
            const typingOverlay = document.getElementById('typing-overlay');
            typingOverlay.style.display = 'flex';

            let bgm = document.getElementById('bg-music');
            bgm.volume = 0.2;
            bgm.play().catch(e => console.log("Lagu butuh mp3 file helikopter.mp3"));

            typeWriter();
        }

        function typeWriter() {
            if (i < message.length) {
                let char = message.charAt(i);
                if (char === '\n') {
                    document.getElementById('typing-text').innerHTML += '<br>';
                } else {
                    document.getElementById('typing-text').innerHTML += char;
                }
                i++;
                setTimeout(typeWriter, 50);
            } else {
                document.getElementById('btn-open').style.display = 'block';
            }
        }

        // --- MAIN SCREEN LOGIC ---
        function openMainScreen() {
            document.getElementById('typing-overlay').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
        }

        // --- PUK PUK LOGIC ---
        let patCount = 0;
        function pukPuk() {
            playPopSound(900);
            patCount++;

            let area = document.getElementById('puk-puk');
            let text = document.getElementById('puk-text');

            area.classList.add('patting');
            setTimeout(() => {
                area.classList.remove('patting');
            }, 150);

            if (patCount === 1) text.innerText = "Hehehehe ~ 🌸";
            else if (patCount === 4) text.innerText = "Keren banget hari ini! ✨";
            else if (patCount === 8) text.innerText = "Enjoy ur timee Kaa ~ 😎";
            else if (patCount === 10) text.innerText = "Jangan lupa istirahat ya Ka hehehe... 🐾";
        }

        window.onload = initGame;
    </script>
</body>

</html>
